##############################################################################
# Docker Compose – Middleware Services (Redis + Qdrant)
# AI-Powered HTTP Request Analyzer (WAF)
#
# Usage:
#   docker compose -f docker-compose.middleware.yaml up -d
#
# Reads connection variables from `.env` in the same directory.
##############################################################################

services:
  # -------------------------------------------------------------------------
  # Redis – verdict cache
  # -------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: waf-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Qdrant – Hybrid-Search vector database
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: waf-qdrant
    restart: unless-stopped
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      - QDRANT__SERVICE__GRPC_PORT=6334
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # http.ingest – Mirror traffic receiver → forwards to BlueAgent /api/analyze
  # -------------------------------------------------------------------------
  http-ingest:
    build:
      context: ./http.ingest
      dockerfile: Dockerfile
    container_name: waf-http-ingest
    restart: unless-stopped
    ports:
      - "${INGEST_PORT:-9002}:9002"
    environment:
      - PORT=9002
      - AI_URL=${AI_URL:-http://host.gateway.docker.internal:5000/api/analyze}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9002/healthz || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 3

volumes:
  redis_data:
  qdrant_data:
